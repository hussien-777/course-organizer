<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <title>Add Course - Hussien</title>
        <link rel="stylesheet" href="style.css">
    </head>
<body>
    <header>
        <h1>Registration</h1>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="courses.html">My Courses</a>
        <a href="add-courses.html">Add New Course</a>
        <a href="contact.html">Contact Us</a>
    </nav>

    <main>
        <section>
            <h2>Register New Subject</h2>
            <form action="#" method="post" class="contact-form">
                
                <div class="form-group">
                    <label for="course-title">Course Title :</label>
                    <input type="text" id="course-title" name="title" placeholder="Enter course name" required>
                </div>

                <div class="form-group">
                    <label for="instructor">Instructor Name:</label>
                    <input type="text" id="instructor" name="instructor" placeholder="Enter doctor name" required>
                </div>

                <div class="form-group">
                    <label for="hours">Credit Hours:</label>
                    <input type="number" id="hours" name="hours" placeholder=Hours required>
                </div>

            
              

                <button type="submit" class="submit-btn">Confirm Registration</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Developed by Hussien</p>
    </footer>
</body>
</html>
